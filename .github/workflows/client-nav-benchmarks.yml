# Setup taken from https://codspeed.io/docs/benchmarks/nodejs/vitest
name: Benchmarks

on:
  push:
    branches:
      - 'main'
    paths:
      - 'packages/**'
      - 'benchmarks/**'
  pull_request:
    paths:
      - 'packages/**'
      - 'benchmarks/**'
  workflow_dispatch:

permissions:
  contents: read # required for actions/checkout
  id-token: write # required for OIDC authentication with CodSpeed

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  SERVER_PRESET: 'node-server'
  NX_NO_CLOUD: true

jobs:
  benchmarks:
    name: Run ${{ matrix.benchmark }}:${{ matrix.framework }} CodSpeed benchmark
    strategy:
      fail-fast: false
      matrix:
        framework:
          - react
          - solid
          - vue
        benchmark:
          - client-nav
          - ssr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Tools
        uses: TanStack/config/.github/setup@e4b48f16568324f76f467aa4c2aac2f05db632c3 # main

      - name: Run ${{ matrix.benchmark }}:${{ matrix.framework }} CodSpeed benchmark
        continue-on-error: true
        uses: CodSpeedHQ/action@3194d9a39c4d46684cb44bf7207fc56626aad8fd # v4
        with:
          mode: simulation
          run: WITH_INSTRUMENTATION=1 pnpm nx run @benchmarks/${{ matrix.benchmark }}:test:perf:${{ matrix.framework }}
