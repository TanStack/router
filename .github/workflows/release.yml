name: Release

on:
  push:
    # we do not support `'*-maint'` branches at this time
    branches: [main, '*-pre']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  SERVER_PRESET: 'node-server'

permissions: {}

jobs:
  select-mode:
    name: Select Mode
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      mode: ${{ steps.changesets.outputs.mode }}
      publish-plan-artifact-id: ${{ steps.changesets.outputs.publish-plan-artifact-id }}
      prerelease: ${{ steps.release-channel.outputs.prerelease }}
      latest: ${{ steps.release-channel.outputs.latest }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Tools
        uses: TanStack/config/.github/setup@e4b48f16568324f76f467aa4c2aac2f05db632c3 # main
      - name: Enter Pre-Release Mode
        if: "contains(github.ref_name, '-pre') && !hashFiles('.changeset/pre.json')"
        run: pnpm changeset pre enter pre
      - name: Determine Release Channel
        id: release-channel
        run: |
          if [[ "$GITHUB_REF_NAME" == *-pre ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "latest=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Select Release Mode
        id: changesets
        uses: changesets/action/select-mode@8f7aee55a02899b4d6140157e482211eb49fcbee # v2.0.0-next.2

  version:
    name: Version
    needs: select-mode
    if: needs.select-mode.outputs.mode == 'version'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Tools
        uses: TanStack/config/.github/setup@e4b48f16568324f76f467aa4c2aac2f05db632c3 # main
      - name: Enter Pre-Release Mode
        if: "contains(github.ref_name, '-pre') && !hashFiles('.changeset/pre.json')"
        run: pnpm changeset pre enter pre
      - name: Create or Update Release Pull Request
        uses: changesets/action/version@8f7aee55a02899b4d6140157e482211eb49fcbee # v2.0.0-next.2
        with:
          github-token: ${{ github.token }}
          script: pnpm run changeset:version
          pr-title: 'ci: Version Packages'
          commit-message: 'ci: changeset release'
          commit-mode: github-api

  pack:
    name: Pack
    needs: select-mode
    if: needs.select-mode.outputs.mode == 'publish'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      pack-dir-artifact-id: ${{ steps.pack.outputs.pack-dir-artifact-id }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Tools
        uses: TanStack/config/.github/setup@e4b48f16568324f76f467aa4c2aac2f05db632c3 # main
      - name: Run Build
        run: pnpm run build:all -- --skipRemoteCache
      - name: Pack Packages
        id: pack
        uses: changesets/action/pack@8f7aee55a02899b4d6140157e482211eb49fcbee # v2.0.0-next.2
        with:
          publish-plan-artifact-id: ${{ needs.select-mode.outputs.publish-plan-artifact-id }}

  publish-npm:
    name: Publish to npm
    needs: [select-mode, pack]
    if: needs.select-mode.outputs.mode == 'publish'
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 20
    outputs:
      published: ${{ steps.publish.outputs.published }}
      published-packages: ${{ steps.publish.outputs.published-packages }}
    permissions:
      actions: read
      id-token: write
    steps:
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Download Packed Packages
        id: download-pack
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          artifact-ids: ${{ needs.pack.outputs.pack-dir-artifact-id }}
          path: changeset-pack
          merge-multiple: true
      - name: Publish Packed Packages
        id: publish
        env:
          PACK_DIR: ${{ steps.download-pack.outputs.download-path }}
        run: |
          node <<'EOF'
          import { appendFileSync, readFileSync } from 'node:fs'
          import path from 'node:path'
          import { spawnSync } from 'node:child_process'

          const packDir = process.env.PACK_DIR
          const githubOutput = process.env.GITHUB_OUTPUT

          if (!packDir) {
            throw new Error('PACK_DIR is required')
          }

          if (!githubOutput) {
            throw new Error('GITHUB_OUTPUT is required')
          }

          const publishPlanPath = path.join(packDir, 'publish-plan.json')
          const publishPlan = JSON.parse(readFileSync(publishPlanPath, 'utf8'))
          const releases = publishPlan.plan
            .flat()
            .filter((release) => release.kind === 'publish')

          const publishedPackages = []

          for (const release of releases) {
            if (!release.tarball?.path) {
              throw new Error(
                `Missing packed tarball metadata for ${release.name}@${release.version}`,
              )
            }

            const tarball = path.join(packDir, release.tarball.path)
            const args = [
              'publish',
              tarball,
              '--tag',
              release.tag,
              '--access',
              release.access,
              '--registry',
              release.registry,
              '--provenance',
              '--json',
            ]

            console.info(
              `Publishing ${release.name}@${release.version} with dist-tag ${release.tag}`,
            )

            const result = spawnSync('npm', args, {
              encoding: 'utf8',
              stdio: ['ignore', 'pipe', 'pipe'],
            })
            const output = `${result.stdout || ''}${result.stderr || ''}`

            if (result.stdout) {
              process.stdout.write(result.stdout)
            }
            if (result.stderr) {
              process.stderr.write(result.stderr)
            }

            if (result.status !== 0) {
              if (output.includes('cannot publish over the previously published version')) {
                console.warn(
                  `${release.name}@${release.version} is already published; skipping`,
                )
                continue
              }

              process.exit(result.status ?? 1)
            }

            publishedPackages.push({
              name: release.name,
              version: release.version,
            })
          }

          appendFileSync(
            githubOutput,
            `published=${publishedPackages.length > 0 ? 'true' : 'false'}\n`,
          )
          appendFileSync(
            githubOutput,
            `published-packages=${JSON.stringify(publishedPackages)}\n`,
          )
          EOF

  github-release:
    name: Create GitHub Release
    needs: [select-mode, publish-npm]
    if: needs.publish-npm.outputs.published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true # create-github-release pushes the aggregate release tag
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Create GitHub Release
        run: node scripts/create-github-release.mjs ${{ needs.select-mode.outputs.prerelease == 'true' && '--prerelease' }} ${{ needs.select-mode.outputs.latest == 'true' && '--latest' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
